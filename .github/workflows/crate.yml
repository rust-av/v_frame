name: Crate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: Run clippy (padding_api feature)
        run: cargo clippy --all-targets --features padding_api -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (default features)
        run: cargo test --all-targets
      - name: Run tests (padding_api feature)
        run: cargo test --all-targets --features padding_api

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-msrv
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv
      - name: Validate minimum Rust version
        run: cargo msrv verify

  test-wasm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # TODO: wasm32-unknown-unknown (might need another tool that's not wasmtime)
        target: ["wasm32-wasip1", "wasm32-wasip2"]
        feature: ["", "--features padding_api"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install wasmtime
        uses: taiki-e/install-action@v2
        with:
          tool: wasmtime
      - name: Build tests
        run: cargo build --tests --target ${{ matrix.target }} ${{ matrix.feature }}
      - name: Run tests
        run: |
          FILE=$(find target/${{ matrix.target }} -type f -name 'v_frame*.wasm')
          wasmtime run "$FILE"

  # Disabling miri for now since it seems to be really, really slow
  # We should run it manually instead of on every CI run
  # miri:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: dtolnay/rust-toolchain@nightly
  #       with:
  #         components: miri, rust-src
  #     - uses: Swatinem/rust-cache@v2
  #     - name: Run miri
  #       env:
  #         RUSTFLAGS: -Zrandomize-layout
  #         MIRIFLAGS: -Zmiri-symbolic-alignment-check
  #       run: cargo miri test --features padding_api

  code-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate code coverage
        run: cargo llvm-cov --all-targets --features padding_api --lcov --output-path lcov.log
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.log
          fail_ci_if_error: true
